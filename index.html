<audio loop id="music">
    <source src="https://github.com/spadesvixen/spadesvixen.github.io/raw/refs/heads/main/assets/misc/Rainbow%20Road%20-%20Kart%20DS.mp3" type="audio/mpeg">
</audio>

<button id="mute"> Play Audio
</button>

<script>
  var audio = document.getElementById("music");
  var btn = document.getElementById("mute");

  btn.onclick = function() {
    if (audio.paused) {
      audio.play();
      btn.innerHTML = "Pause Audio";
    } else {
      audio.pause();
      btn.innerHTML = "Play Audio";
    }
  };
</script>
